name: Generate Code-Driven BLSN Reports

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  full-matrix-validation:
    name: Run (${{ matrix.os }} - Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "pypy-3.9"
          - os: ubuntu-latest
            python-version: "3.13-dev"
          - os: ubuntu-latest
            python-version: "3.14-dev"

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Core & Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff yamllint pyyaml matplotlib fpdf2

      - name: Data Substrate Linting (YAML & JSON)
        if: matrix.python-version == '3.9' && matrix.os == 'ubuntu-latest'
        run: |
          echo "=== YAML LINTING ==="
          yamllint config/blsn_config.yaml -d "{extends: default, rules: {line-length: disable}}"
          echo "=== JSON LINTING ==="
          find . -name "*.json" -print0 | xargs -0 -r -I {} python -m json.tool {} > /dev/null
          echo "--> All YAML and JSON substrates structurally validated."

      - name: Python Linting (Ruff Check)
        if: matrix.python-version == '3.9' && matrix.os == 'ubuntu-latest'
        run: ruff check .

      - name: Technical Debt Radar (Ruff 3.12 Upgrade Check)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          echo "=== TECHNICAL DEBT REPORT ==="
          ruff check . --select UP --target-version py312 --output-format=github || true

      - name: Logic Validation & Speed Telemetry (Pytest)
        id: runtime_test
        continue-on-error: ${{ matrix.python-version != '3.9' || matrix.os != 'ubuntu-latest' }}
        run: pytest -v --showlocals --durations=0

      - name: Execute Idempotent BLSN Engine
        if: matrix.python-version == '3.9' && matrix.os == 'ubuntu-latest'
        run: python -m src.pipeline

      - name: Archive Engineering Outputs
        if: matrix.python-version == '3.9' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: blsn-docs-and-charts
          path: docs/

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: full-matrix-validation
    if: github.ref == 'refs/heads/main' && needs.full-matrix-validation.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Publishing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml fpdf2

      - name: Build docs/ publish assets
        run: python -m src.pipeline

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
