name: Generate Code-Driven BLSN Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Configuration Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Execute Idempotent BLSN Engine
      run: python src/pipeline.py

    - name: Archive Engineering Outputs
      uses: actions/upload-artifact@v4
      with:
        name: blsn-html-and-charts
        path: output/
