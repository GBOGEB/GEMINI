name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual triggers from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job MUST be named `copilot-setup-steps` — Copilot will not pick it up otherwise.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # needed to checkout the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: |
            .github/workflows/copilot-setup-steps.yml
            pyproject.toml

      - name: Install All Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-json-report \
            ruff yamllint \
            pyyaml matplotlib fpdf2 plotly pandas numpy
